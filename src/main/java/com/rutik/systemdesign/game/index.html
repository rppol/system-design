<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>LORA — Learn Often, Recall Always</title>
  <script>
    // Apply the saved theme before first paint so there is no color flash.
    // ?theme=<id> overrides for quick previews/sharing without touching the saved pick.
    var _t = new URLSearchParams(location.search).get("theme") ||
      localStorage.getItem("sd_theme") || "midnight";
    if (!/^(midnight|orchid|ember|daylight)$/.test(_t)) _t = "midnight";  // retired ids fall back
    document.documentElement.dataset.theme = _t;
  </script>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'%3E%3Crect width='512' height='512' rx='112' fill='%2306070d'/%3E%3Cline x1='296' y1='256' x2='392' y2='222' stroke='%23f59e0b' stroke-width='20'/%3E%3Cline x1='140' y1='256' x2='200' y2='256' stroke='%238b9dff' stroke-width='18'/%3E%3Cpolygon points='244,204 296,256 244,308 192,256' fill='%230c101f' stroke='%238b9dff' stroke-width='18' stroke-linejoin='round'/%3E%3Ccircle cx='118' cy='256' r='28' fill='%238b9dff'/%3E%3Ccircle cx='392' cy='222' r='32' fill='%23fbbf24'/%3E%3C/svg%3E" />
  <link rel="apple-touch-icon" href="apple-touch-icon.png" />
  <link rel="manifest" href="manifest.webmanifest" />
  <meta name="theme-color" content="#06070d" />
</head>
<body>
  <div class="backdrop" aria-hidden="true">
    <div class="mesh m1"></div><div class="mesh m2"></div><div class="mesh m3"></div>
  </div>

  <header class="topbar">
    <div class="brand" id="brandHome" role="button" tabindex="0" title="Home" aria-label="LORA — go to home screen">LORA<span class="byline">by Rutik</span></div>
    <div class="stats">
      <div class="stat lvl" id="lvlChip" title="Level (from total XP) &middot; ring shows progress to next level">
        <svg class="lvl-ring" width="22" height="22" viewBox="0 0 22 22" aria-hidden="true">
          <circle class="lvl-ring-bg" cx="11" cy="11" r="9"/>
          <circle class="lvl-ring-fg" id="lvlRingFg" cx="11" cy="11" r="9"/>
        </svg>
        <span>Lv&nbsp;<b id="lvlVal">1</b> &middot; <b id="lvlTitle">Intern</b></span>
      </div>
      <button id="streakChip" class="stat" title="Day streak &middot; click for detail" aria-haspopup="true" aria-expanded="false"><svg class="icon i-flame" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z"/></svg><b id="streakVal">0</b></button>
      <div class="stat" title="Total XP"><svg class="icon i-bolt" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10"/></svg><b id="xpVal">0</b></div>
      <button id="modeBtn" class="ghost" title="Quiz vs flashcards">Quiz</button>
      <button id="themeBtn" class="ghost icon" title="Theme" aria-haspopup="true" aria-expanded="false"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><circle cx="12" cy="12" r="9"/><path d="M12 3a9 9 0 0 0 0 18z" fill="currentColor" stroke="none"/></svg></button>
      <button id="muteBtn" class="ghost icon" title="Toggle sound"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></svg></button>
      <button id="moreBtn" class="ghost icon" aria-label="More options" aria-haspopup="dialog" title="More options"><svg class="icon" viewBox="0 0 24 24" fill="currentColor" stroke="none" aria-hidden="true"><circle cx="12" cy="5" r="2"/><circle cx="12" cy="12" r="2"/><circle cx="12" cy="19" r="2"/></svg></button>
      <button id="navStudy" class="ghost" title="Read your notes (no quiz)">Study</button>
      <button id="navProgress" class="ghost">Progress</button>
    </div>
  </header>

  <main id="app" tabindex="-1">
    <!-- screens injected here -->
    <div class="loading">Loading your question bank&hellip;</div>
  </main>

  <div id="live" class="sr-only" role="status" aria-live="polite"></div>

  <footer class="foot">Built from your own repo &middot; <span id="bankInfo"></span> &middot; <button id="helpBtn" class="linklike">shortcuts (?)</button></footer>

  <nav id="tabbar" class="tabbar" aria-label="Primary">
    <button class="tab" data-tab="home" aria-label="Home">
      <svg class="tabicon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      <span>Home</span>
    </button>
    <button class="tab" data-tab="study" aria-label="Study">
      <svg class="tabicon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
      <span>Study</span>
    </button>
    <button class="tab" data-tab="progress" aria-label="Progress">
      <svg class="tabicon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
      <span>Progress</span>
    </button>
  </nav>

  <script src="app.js"></script>
</body>
</html>
