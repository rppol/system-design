name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only one deploy at a time; later pushes queue instead of cancelling.
# cancel-in-progress must stay FALSE: cancelling a run mid-deploy makes its
# cleanup cancel the site's newest Pages deployment — the next run then dies
# with "Deployment cancelled" (hit on 2026-07-02, runs e51843e -> 6a3c784).
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Regenerate question bank + graphs, stamp service worker
        # build_banks.sh is shared with the Android APK build so the two surfaces
        # can never ship different banks. The sw.js stamp stays HERE and only
        # here: it is Pages-only cache-busting, and the APK's smoke test asserts
        # the literal __BUILD__ still ships in its copy.
        run: |
          bash scripts/build_banks.sh
          cd src/main/java/com/rutik/systemdesign/game
          sed -i "s/__BUILD__/$(date +%Y%m%d%H%M%S)/" sw.js

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Pre-render Mermaid diagrams to static SVG
        # Drives the app in headless Chromium (Puppeteer) and renders every fence
        # to game/diagrams/<hash>.mmz (gitignored, regenerated here). The runtime
        # reads these instead of loading the mermaid engine, so diagrams draw with
        # no CDN and no per-diagram render cost. A diagram failure never blocks the
        # deploy — the reader live-renders that fence. node_modules is removed after
        # so it never lands in the Pages artifact (path: . uploads the whole tree).
        run: |
          npm ci --no-audit --no-fund
          node scripts/build_icons.mjs
          npx --yes puppeteer browsers install chrome
          python3 -m http.server 8901 >/tmp/diag_http.log 2>&1 &
          SERVER_PID=$!
          sleep 2
          node scripts/build_diagrams.mjs --base http://localhost:8901
          kill $SERVER_PID || true
          rm -rf node_modules

      - uses: actions/upload-pages-artifact@v3
        with:
          # Deploy the whole repo root so every content path resolves correctly.
          path: .

  deploy:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 40
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      # deploy-pages clamps its `timeout` input to a 10-minute max, so a single
      # attempt cannot outwait a backed-up Pages queue (hit 2026-07-02 during a
      # GitHub Pages incident). Chain up to 3 attempts — each failed attempt
      # cleanly cancels its own deployment before the next one starts.
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        continue-on-error: true
      - name: Retry deploy (Pages queue was backed up)
        id: deployment2
        if: steps.deployment.outcome == 'failure'
        uses: actions/deploy-pages@v4
        continue-on-error: true
      - name: Second retry deploy
        id: deployment3
        if: steps.deployment.outcome == 'failure' && steps.deployment2.outcome == 'failure'
        uses: actions/deploy-pages@v4
