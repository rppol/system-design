name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only one deploy at a time; later pushes queue instead of cancelling.
# cancel-in-progress must stay FALSE: cancelling a run mid-deploy makes its
# cleanup cancel the site's newest Pages deployment — the next run then dies
# with "Deployment cancelled" (hit on 2026-07-02, runs e51843e -> 6a3c784).
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Regenerate question bank
        # Runs extract.py fresh so newly added modules are picked up automatically.
        # No need to commit questions/*.json — the artifact carries them.
        run: |
          cd src/main/java/com/rutik/systemdesign/game
          python3 extract.py

      - uses: actions/upload-pages-artifact@v3
        with:
          # Deploy the whole repo root so every content path resolves correctly.
          path: .

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
