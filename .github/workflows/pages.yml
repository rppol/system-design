name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only one deploy at a time; later pushes queue instead of cancelling.
# cancel-in-progress must stay FALSE: cancelling a run mid-deploy makes its
# cleanup cancel the site's newest Pages deployment — the next run then dies
# with "Deployment cancelled" (hit on 2026-07-02, runs e51843e -> 6a3c784).
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Regenerate question bank + graphs, stamp service worker
        # Runs extract.py fresh so newly added modules are picked up automatically,
        # then rebuilds the module-relatedness graph for every section, then stamps
        # the deploy time into sw.js so the PWA shell cache busts on every deploy.
        # No need to commit questions/*.json or graph/*.json — the artifact carries them.
        run: |
          cd src/main/java/com/rutik/systemdesign/game
          python3 extract.py
          for sec in $(python3 -c "import json;print(' '.join(json.load(open('questions/index.json'))['sections']))"); do
            python3 build_graph.py "$sec"
          done
          sed -i "s/__BUILD__/$(date +%Y%m%d%H%M%S)/" sw.js

      - uses: actions/upload-pages-artifact@v3
        with:
          # Deploy the whole repo root so every content path resolves correctly.
          path: .

  deploy:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 40
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      # deploy-pages clamps its `timeout` input to a 10-minute max, so a single
      # attempt cannot outwait a backed-up Pages queue (hit 2026-07-02 during a
      # GitHub Pages incident). Chain up to 3 attempts — each failed attempt
      # cleanly cancels its own deployment before the next one starts.
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        continue-on-error: true
      - name: Retry deploy (Pages queue was backed up)
        id: deployment2
        if: steps.deployment.outcome == 'failure'
        uses: actions/deploy-pages@v4
        continue-on-error: true
      - name: Second retry deploy
        id: deployment3
        if: steps.deployment.outcome == 'failure' && steps.deployment2.outcome == 'failure'
        uses: actions/deploy-pages@v4
