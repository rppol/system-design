name: Build Android APK

# Every push to main (fresh offline APK) plus manual dispatch.
on:
  push:
    branches: [main]
  workflow_dispatch:

# Unlike pages.yml, a superseded APK build is safe to cancel — only the newest
# commit's APK matters.
concurrency:
  group: android-apk
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  # Gate on the signing secret. If it is missing we skip the build cleanly
  # (green/neutral) rather than painting main red on every push forever.
  gate:
    runs-on: ubuntu-latest
    outputs:
      signing: ${{ steps.check.outputs.signing }}
    steps:
      - name: Check signing secrets
        id: check
        # All four are required to assemble a signed release. Checking only the
        # keystore let a half-configured secret set pass the gate and then paint
        # main red at assembleRelease. (A secret that is set but WRONG still
        # fails loudly there — that is intended: unconfigured skips quietly,
        # misconfigured shouts.)
        env:
          KEYSTORE_B64: ${{ secrets.KEYSTORE_B64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          MISSING=""
          for name in KEYSTORE_B64 KEYSTORE_PASSWORD KEY_ALIAS KEY_PASSWORD; do
            [ -n "${!name}" ] || MISSING="$MISSING $name"
          done
          if [ -n "$MISSING" ]; then
            echo "::warning::Skipping APK build: missing signing secret(s):$MISSING"
            echo "::warning::Add them in Settings > Secrets and variables > Actions to enable it."
            echo "signing=false" >> "$GITHUB_OUTPUT"
          else
            echo "signing=true" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: gate
    if: needs.gate.outputs.signing == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4
        with:
          # rev-list --count HEAD needs full history for a monotonic versionCode.
          fetch-depth: 0

      - name: Derive version
        id: ver
        run: |
          VC=$(git rev-list --count HEAD)
          VN="$(date -u +%Y.%m.%d)-$(git rev-parse --short HEAD)"
          echo "VERSION_CODE=$VC" >> "$GITHUB_ENV"
          echo "VERSION_NAME=$VN" >> "$GITHUB_ENV"
          echo "code=$VC" >> "$GITHUB_OUTPUT"
          echo "name=$VN" >> "$GITHUB_OUTPUT"

      - name: Validate SPA syntax
        # A syntax error in app.js still assembles a perfectly signed APK (R8 is
        # off, nothing else parses the JS) and ships a white screen. Parse it
        # before spending 10 minutes building.
        run: |
          node --check src/main/java/com/rutik/systemdesign/game/app.js
          node --check src/main/java/com/rutik/systemdesign/game/sw.js

      - name: Build WebView asset payload
        # build_android_assets.sh calls scripts/build_banks.sh itself, which is
        # the single source of bank/graph generation shared with pages.yml.
        run: bash scripts/build_android_assets.sh

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        # Gradle 8.10: AGP 8.7 requires 8.9+, and Kotlin 2.1.0 supports up to 8.10.
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.10"

      - name: Decode release keystore
        env:
          KEYSTORE_B64: ${{ secrets.KEYSTORE_B64 }}
        run: |
          echo "$KEYSTORE_B64" | base64 --decode > android/app/release.keystore

      - name: Assemble signed release APK
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/android/app/release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          gradle -p android :app:assembleRelease
          cp android/app/build/outputs/apk/release/app-release.apk \
             android/app/build/outputs/apk/release/systemdesign-daily.apk

      - name: Smoke-test APK payload
        # Everything below is a white-screen-class failure that a green build
        # would otherwise publish to releases/latest. unzip/zipinfo/python3/node
        # only — aapt is not guaranteed on the runner.
        run: |
          APK=android/app/build/outputs/apk/release/systemdesign-daily.apk
          for f in assets/www/game/index.html assets/www/game/app.js \
                   assets/www/game/style.css assets/www/game/sw.js \
                   assets/www/game/vendor/mermaid.min.js \
                   assets/www/game/questions/index.json; do
            unzip -l "$APK" "$f" > /dev/null || { echo "MISSING from APK: $f"; exit 1; }
          done
          # The JS that ships is the JS that parses (post-rsync copy, not the source).
          unzip -p "$APK" assets/www/game/app.js > /tmp/shipped-app.js
          node --check /tmp/shipped-app.js
          # Bank/graph completeness measured inside the artifact itself.
          SEC=$(unzip -p "$APK" assets/www/game/questions/index.json \
                | python3 -c "import json,sys;print(len(json.load(sys.stdin)['sections']))")
          GRAPHS=$(zipinfo -1 "$APK" 'assets/www/game/graph/*.json' | wc -l)
          BANKS=$(zipinfo -1 "$APK" 'assets/www/game/questions/*.json' | wc -l)
          [ "$GRAPHS" -eq "$SEC" ] || { echo "graphs $GRAPHS != sections $SEC"; exit 1; }
          [ "$BANKS" -eq $((SEC + 1)) ] || { echo "banks $BANKS != sections+index ($SEC+1)"; exit 1; }
          # The APK must never receive the Pages-only service-worker stamp.
          unzip -p "$APK" assets/www/game/sw.js | grep -q '__BUILD__' \
            || { echo "sw.js in the APK was Pages-stamped"; exit 1; }
          # Pre-rendered Mermaid diagrams must ship, or every diagram would fall
          # back to the (offline-vendored) engine — the payload is the whole point.
          MMZ=$(zipinfo -1 "$APK" 'assets/www/game/diagrams/*.mmz' | wc -l)
          [ "$MMZ" -ge 3000 ] || { echo "pre-rendered diagrams missing: only $MMZ .mmz in APK"; exit 1; }
          # ~90 MiB now: the ~59 MB content tree (~2x-compressible) plus ~62 MB of
          # pre-rendered diagram assets (game/diagrams/*.mmz, already gzipped so they
          # don't shrink further in the zip). Band widened for the diagram payload;
          # still catches "content went missing" and "something exploded".
          SIZE=$(stat -c%s "$APK")
          [ "$SIZE" -ge $((15*1024*1024)) ] && [ "$SIZE" -le $((130*1024*1024)) ] \
            || { echo "APK size $SIZE outside the 15-130 MiB window"; exit 1; }
          echo "smoke OK: sections=$SEC banks=$BANKS graphs=$GRAPHS mmz=$MMZ size=$SIZE"

      - name: Publish GitHub Release
        # Primary delivery: a stable latest URL at
        # releases/latest/download/systemdesign-daily.apk. Auth via GITHUB_TOKEN.
        uses: softprops/action-gh-release@v2
        with:
          tag_name: apk-v${{ steps.ver.outputs.code }}
          name: APK ${{ steps.ver.outputs.name }}
          files: android/app/build/outputs/apk/release/systemdesign-daily.apk
          make_latest: true

      - name: Upload APK artifact (fallback)
        uses: actions/upload-artifact@v4
        with:
          name: systemdesign-daily.apk
          path: android/app/build/outputs/apk/release/systemdesign-daily.apk
          if-no-files-found: error
